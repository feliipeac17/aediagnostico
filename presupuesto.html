<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AE Diagnóstico - Presupuesto Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary-blue: #1d4ed8;
            --primary-red: #d32f2f;
            --dark-navy: #1e293b;
            --gray-light: #f8fafc;
            --border-color: #e2e8f0;
            --text-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: var(--text-color);
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 25px;
        }

        /* Navegación */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .btn-back {
            background: #64748b;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 9pt;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Formulario de captura en pantalla */
        .section-title {
            font-size: 10pt;
            font-weight: 700;
            color: var(--dark-navy);
            text-transform: uppercase;
            margin: 25px 0 12px 0;
            border-bottom: 2px solid var(--dark-navy);
            padding-bottom: 4px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 8pt;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
        }

        .form-group input, .form-group select {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 9.5pt;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary-red);
        }

        /* Columnas de captura de costos */
        .columns-capture {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        @media (max-width: 800px) {
            .columns-capture { grid-template-columns: 1fr; }
        }

        .column-box {
            background: var(--gray-light);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
        }

        .column-box h3 {
            font-size: 9pt;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 6px;
            margin-bottom: 12px;
            color: var(--dark-navy);
        }

        .item-row {
            display: grid;
            grid-template-columns: 2fr 1fr 30px;
            gap: 6px;
            align-items: center;
            margin-bottom: 8px;
        }

        .item-row input {
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 6px;
            font-size: 8.5pt;
            outline: none;
        }

        .btn-delete-row {
            background: #fee2e2;
            color: var(--primary-red);
            border: none;
            border-radius: 4px;
            height: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-add-row {
            background: #fff;
            border: 1px dashed var(--border-color);
            padding: 8px;
            font-size: 8pt;
            font-weight: 600;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        /* Bloque de Totales en pantalla */
        .totales-capture {
            display: flex;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .totales-box {
            background: var(--gray-light);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .totales-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 9.5pt;
            font-weight: 600;
        }

        .totales-row input {
            width: 110px;
            text-align: right;
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        .btn-submit-app {
            background: var(--primary-red);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 11pt;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
        }

        /* ==========================================================================
           🎨 ESTILOS DE LA PLANTILLA DE EXPORTACIÓN (REPRODUCCIÓN IDÉNTICA DE LA IMAGEN)
           ========================================================================== */
        #pdf-template {
            width: 210mm;
            min-height: 297mm;
            padding: 15mm 15mm 10mm 15mm;
            background: #ffffff;
            color: #1e293b;
            display: none; /* Se mantiene oculto en pantalla y solo se activa en la renderización temporal */
            position: absolute;
            left: -9999px;
            top: -9999px;
        }

        /* Cabecera Asimétrica */
        .pdf-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            position: relative;
        }

        .pdf-taller {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pdf-taller-info h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 18pt;
            font-weight: 800;
            color: #0f172a;
            line-height: 1;
        }

        .pdf-taller-info h1 span {
            color: var(--primary-red);
        }

        .pdf-taller-info p {
            font-size: 7.5pt;
            color: #64748b;
            margin-top: 4px;
            line-height: 1.4;
        }

        /* Bloque Folio / Fecha */
        .pdf-folio-container {
            background-color: #0f172a;
            border-radius: 8px;
            padding: 12px 15px;
            min-width: 200px;
            color: #ffffff;
        }

        .pdf-folio-badge {
            background-color: #0284c7;
            color: #ffffff;
            font-size: 7.5pt;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .pdf-meta-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 8pt;
        }

        .pdf-meta-table td {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pdf-meta-table td:first-child {
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
        }

        .pdf-meta-table td:last-child {
            text-align: right;
            font-weight: 700;
        }

        /* Línea decorativa degradada */
        .pdf-divider {
            height: 3px;
            background: linear-gradient(90deg, var(--primary-blue) 0%, var(--primary-red) 100%);
            margin-bottom: 20px;
            border-radius: 2px;
        }

        /* Bloque Informativo */
        .pdf-info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .pdf-info-header h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 13pt;
            font-weight: 800;
            color: #0f172a;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .pdf-info-header h2 span {
            color: #0284c7;
        }

        .pdf-badge-informativo {
            background-color: var(--primary-red);
            color: white;
            font-size: 7pt;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Contenedores de Cliente y Vehículo (Con bordes gruesos e iconos) */
        .pdf-grid-boxes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .pdf-info-card {
            background-color: var(--gray-light);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            position: relative;
        }

        .pdf-info-card.cliente {
            border-left: 4px solid var(--primary-blue);
        }

        .pdf-info-card.vehiculo {
            border-left: 4px solid var(--primary-red);
        }

        .pdf-card-icon {
            position: absolute;
            top: 12px;
            right: 15px;
            color: #94a3b8;
            font-size: 14pt;
        }

        .pdf-card-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 9pt;
            font-weight: 700;
            color: #0f172a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .pdf-card-data {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .pdf-data-item {
            font-size: 7.5pt;
        }

        .pdf-data-item span {
            display: block;
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 6.5pt;
            margin-bottom: 2px;
        }

        .pdf-data-item strong {
            color: #0f172a;
            font-size: 8pt;
        }

        /* Las 3 Columnas de Costos */
        .pdf-pillars-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .pdf-pillar-card {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            background-color: #
