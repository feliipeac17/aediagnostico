<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Presupuesto AE Diagnóstico</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Estilos base para mantener tu formato profesional */
        body { font-family: Arial, sans-serif; padding: 20px; }
        #printable-canvas { width: 800px; padding: 20px; margin: 0 auto; background: white; }
        .btn-ctrl-col { margin: 10px 0; padding: 10px; cursor: pointer; }
        .table-row { display: flex; gap: 10px; margin-bottom: 10px; }
        input { padding: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div id="printable-canvas">
        <h1>AE DIAGNÓSTICO</h1>
        <div id="listServicios">
            <h3>Servicios</h3>
            <div class="table-row">
                <input type="text" placeholder="Descripción">
                <input type="number" placeholder="Precio">
            </div>
        </div>
        <button class="btn-ctrl-col" onclick="agregarRenglon('listServicios')">Agregar Servicio</button>
    </div>

    <button style="display:block; margin: 20px auto; padding: 15px; background: red; color: white;" 
            onclick="descargarPDF()">📥 DESCARGAR PDF</button>

    <script>
        function agregarRenglon(id) {
            const div = document.createElement('div');
            div.className = 'table-row';
            div.innerHTML = `<input type="text" placeholder="Desc"> <input type="number" placeholder="Precio">`;
            document.getElementById(id).appendChild(div);
        }

        function descargarPDF() {
            const element = document.getElementById('printable-canvas');
            
            // 1. Ocultar botones de control antes de capturar
            const botones = document.querySelectorAll('.btn-ctrl-col');
            botones.forEach(b => b.style.display = 'none');

            // 2. Configuración estricta para evitar duplicidad y cortes
            const opt = {
                margin: 0,
                filename: 'Presupuesto_Final.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 2, width: 800, windowWidth: 800 },
                jsPDF: { unit: 'px', format: [800, 1050], orientation: 'portrait' }
            };

            // 3. Generar y restaurar
            html2pdf().set(opt).from(element).save().then(() => {
                botones.forEach(b => b.style.display = 'block');
            });
        }
    </script>
</body>
</html>
